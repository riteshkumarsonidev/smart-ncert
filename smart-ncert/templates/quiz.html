<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - SMART NCERT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .font-outfit { font-family: 'Outfit', sans-serif; }
        .card-shadow {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .option-card {
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-radius: 1.25rem;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-card:hover {
            border-color: #e2e8f0;
            background: white;
            transform: translateY(-2px);
        }
        input[type="radio"]:checked + .option-card {
            border-color: #4f46e5;
            background: #eef2ff;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1);
        }
        input[type="radio"]:checked + .option-card .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        input[type="radio"]:checked + .option-card .radio-circle {
            border-color: #4f46e5;
            background: #4f46e5;
        }
        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .radio-circle {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="antialiased min-h-screen py-12">
    <div class="container mx-auto px-6 max-w-4xl">
        <div class="card-shadow p-10 relative overflow-hidden">
            <!-- Header -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <div class="flex items-center gap-4">
                    <a href="/student-dashboard" class="w-10 h-10 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div>
                        <h2 class="text-3xl font-bold font-outfit text-slate-900">{{ quiz.subject }} Quiz</h2>
                        <p class="text-slate-500 font-medium">Class {{ session.class }} • NCERT Assessment</p>
                    </div>
                </div>
                <div class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-2xl font-bold border border-indigo-100 flex items-center gap-2">
                    <i data-lucide="help-circle" class="w-5 h-5"></i>
                    <span>{{ quiz.total }} Questions</span>
                </div>
            </div>

            <!-- Quiz Form -->
            <form action="/submit-quiz" method="POST" class="space-y-12">
                {% for i, q in enumerate(quiz.questions) %}
                <div class="space-y-6">
                    <div class="flex gap-5">
                        <span class="flex-shrink-0 w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-bold font-outfit shadow-lg shadow-indigo-100">
                            {{ i + 1 }}
                        </span>
                        <h4 class="text-xl font-bold text-slate-800 leading-relaxed">{{ q.question }}</h4>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pl-14">
                        {% for j, option in enumerate(q.options) %}
                        <div class="relative">
                            <input type="radio" name="q{{ i }}" id="q{{ i }}_o{{ j }}" value="{{ j }}" class="hidden" required>
                            <label for="q{{ i }}_o{{ j }}" class="option-card block w-full">
                                <div class="flex items-center justify-between w-full">
                                    <div class="flex items-center gap-4">
                                        <div class="radio-circle w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center bg-white">
                                            <i data-lucide="check" class="check-icon w-4 h-4 text-white"></i>
                                        </div>
                                        <span class="text-slate-700 font-medium">{{ option }}</span>
                                    </div>
                                </div>
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}
                
                <div class="pt-10 border-t border-slate-100 flex justify-center">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-4 rounded-2xl font-bold text-lg transition-all shadow-xl shadow-indigo-100 hover:scale-105 active:scale-95 flex items-center gap-3">
                        <i data-lucide="check-circle" class="w-6 h-6"></i>
                        Submit Quiz
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
